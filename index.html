<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API MONITOR - Bruno Salustiano</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>API<span> MONITOR</span></h1>
        <p>Status em tempo real das conexões API!</p>
    </header>

    <div class="user-controls" style="display: flex; justify-content: flex-end; align-items: center; gap: 15px; width: 95%; max-width: 1100px; margin: 0 auto 20px auto;">
        <span id="usuario-logado" style="color: var(--accent-lila); font-size: 0.9rem;">
            <i class="fas fa-id-badge"></i> Carregando...
        </span>
        <button onclick="fazerLogout()" class="btn-logout">Sair</button>
    </div>

    <main id="dashboard">
        <section class="painel-geral" id="painel-geral">
            </section>

        <section class="conteudo-monitor">
            <article class="api-card">
                <div class="clock-container">
                    <div class="gauge">
                        <div class="gauge-body"></div>
                        <div class="gauge-fill"></div>
                        <div class="gauge-cover">0ms</div>
                    </div>
                </div>
                <h3 class="nome-do-modelo">Aguardando...</h3>
                <p class="status">Configure um slot para iniciar</p>

                <div class="consumo-container">
                    <div class="barra-fundo">
                        <div id="barra-progresso"></div>
                    </div>
                    <p>Consumo: <span id="valor-consumo">0</span>%</p>
                </div>
                <button onclick="verificarStatusAPI()">Verificar Agora</button>

                <div class="mini-grafico-wrapper" style="margin-top: 25px; width: 100%; height: 120px;">
                    <h4 style="margin-bottom: 5px; font-size: 0.85rem; color: var(--accent-lila); text-align: center;">
                        <i class="fas fa-wave-square"></i> Latência Deste Slot
                    </h4>
                    <canvas id="graficoSlot"></canvas>
                </div>
            </article>

            <section class="config-container">
                <h3>⚙️ Configurar Slot <span id="slot-numero">1</span></h3>
                <form id="form-config-api">
                    <div class="input-group">
                        <label>Apelido</label>
                        <input type="text" id="api-nickname" required>
                    </div>
                    <div class="input-group">
                        <label>Provedor da API</label>
                        <select id="api-provider" required style="width: 100%; padding: 10px; border-radius: 8px; background: var(--input-bg); border: 1px solid var(--gray); color: #fff;">
                            <option value="Groq">Groq</option>
                            <option value="OpenAI">OpenAI / ChatGPT</option>
                            <option value="Gemini">Google Gemini</option>
                            <option value="DeepSeek">DeepSeek</option>
                            <option value="OpenRouter">OpenRouter (Múltiplas IAs)</option>
                            <option value="HuggingFace">Hugging Face</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Modelo</label>
                        <input type="text" id="api-model" required>
                    </div>
                    <div class="input-group">
                        <label>Limite</label>
                        <input type="number" id="api-limit" required>
                    </div>
                    <div class="input-group">
                        <label>API Key</label>
                        <input type="password" id="api-key" required>
                    </div>

                    <div class="card logs-container" style="margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;">
                        <h3 style="font-size: 1rem;"><i class="fas fa-list-ul"></i> Últimas Atividades</h3>
                        <div class="table-responsive">
                            <table id="tabela-logs">
                                <thead>
                                    <tr>
                                        <th>Horário</th>
                                        <th>Slot</th>
                                        <th>Status</th>
                                        <th>Tokens</th>
                                    </tr>
                                </thead>
                                <tbody id="corpo-logs"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="botoes-form" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                        <button type="submit" class="btn-salvar">Salvar Configuração</button>
                        
                        <div class="export-actions" style="display: flex; gap: 10px; justify-content: center;">
                            <button type="button" onclick="baixarRelatorio(event)" class="btn-csv" style="flex: 1; background: #27ae60;">
                                <i class="fas fa-file-csv"></i> Excel (CSV)
                            </button>
                            <button type="button" onclick="gerarRelatorioPDF()" class="btn-pdf" style="flex: 1; background: #e74c3c;">
                                <i class="fas fa-file-pdf"></i> Relatório PDF
                            </button>
                        </div>
                        
                        <button type="button" onclick="limparLogs()" class="btn-limpar">
                            <i class="fas fa-trash"></i> Limpar Logs da Tela
                        </button>
                    </div>
                </form>
            </section>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido por Bruno Ferreira Salustiano.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
